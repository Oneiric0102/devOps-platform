name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: npm test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t devops-platform-backend:ci ./app/backend

      - name: Build frontend image
        run: docker build -t devops-platform-frontend:ci ./app/frontend

  compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create CI env file
        run: cp .env.example .env

      - name: Validate Docker Compose config
        run: docker compose config
