name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [master]

permissions:
  contents: read

concurrency:
  group: deploy-k8s-master
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to kind Kubernetes
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_deploy_key
          chmod 600 ~/.ssh/oci_deploy_key

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Oracle Cloud server
        run: |
          ssh -i ~/.ssh/oci_deploy_key \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "cd '${{ secrets.OCI_PROJECT_PATH }}' && \
             git fetch origin master && \
             git checkout master && \
             git pull origin master && \
             chmod +x scripts/deploy-k8s.sh && \
             ./scripts/deploy-k8s.sh"

      - name: Check deployment status
        run: |
          ssh -i ~/.ssh/oci_deploy_key \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "cd '${{ secrets.OCI_PROJECT_PATH }}' && \
             chmod +x scripts/check-k8s.sh && \
             ./scripts/check-k8s.sh"