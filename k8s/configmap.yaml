apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-platform-config
  namespace: devops-platform
data:
  NODE_ENV: "production"
  PORT: "3000"

  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "devops_platform"
  DATABASE_USER: "devops_user"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  CORS_ORIGIN: "http://localhost:8081"
  LOG_LEVEL: "info"